notes: |
  Groups the core clinical-record surfaces of Athena Provider: real-time vitals with
  staleness safety (the 5s/30s/2min never-show-stale-as-current invariants), FHIR
  resource-correctness chart rendering (Observation/MedicationRequest status handling,
  scoped error boundaries for 404/401/403/422/429/500/timeout), and the XState
  encounter lifecycle (planned → arrived → in-progress → finished/cancelled) that
  gates when the chart and its sub-panels become editable. These three stories share
  one dependency shape — they all read and render live FHIR resources inside the
  chart shell — so they're kept together rather than split further.

  Depends on EPIC-AP-001 because every chart view requires a resolved SMART session,
  patient/encounter context, and a known clinical role before it can render anything.
  No numbered ADR governs this epic directly: ADR-001 (@medplum/fhirtypes) is a
  tooling choice that underlies it but isn't a decision scoped to this epic specifically.

  This is the one Provider epic that imports libs/ui directly, since the chart shell,
  VitalTile, and status badges are rendered UI. Phase 3 is expected to extend this
  epic with two more stories once they're built — the VitalTile and AlertCard UI
  primitives themselves — because libs/ui is a Provider-only rendering surface and
  this is the epic that owns it.
