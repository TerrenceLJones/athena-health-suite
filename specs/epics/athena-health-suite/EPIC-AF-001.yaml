notes: |
  Groups the foundation every other Athena Field feature is built on: device-level
  identity (biometric unlock gating Keychain-held tokens, the two-service Keychain
  architecture, step-up re-auth for sensitive actions) and the offline-first
  storage/sync core (WatermelonDB + SQLCipher as the local source of truth, the
  PENDING → IN_FLIGHT → SYNCED/CONFLICT/FAILED outbox lifecycle, and human-mediated
  clinical conflict resolution — never last-write-wins).

  ADR-002 (WatermelonDB offline sync engine) and ADR-003 (human-mediated clinical
  conflict resolution) both apply directly to this epic — they are the two
  architectural decisions this epic's offline core is built around. No ADR governs
  the biometric-auth half specifically.

  This is the Athena Field analogue of EPIC-AP-001: it has no upstream dependencies
  within Athena Health Suite, and every other Field epic (forms/capture/sync) assumes
  the device is unlocked and the local database + sync/conflict machinery already
  exist.
