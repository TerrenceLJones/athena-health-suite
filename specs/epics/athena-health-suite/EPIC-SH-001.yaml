notes: |
  Groups the three compliance/quality invariants that cut across both apps rather
  than belonging to either one: HIPAA technical safeguards (PHI never in URLs,
  localStorage, analytics, or error reports; compile-time PHI<T> branded-type
  enforcement; 15-minute auto-logoff), WCAG 2.1 AA accessibility (never color-alone
  severity, keyboard navigation, screen-reader announcements, focus-trapped modals,
  44×44px touch targets, CI-blocking axe scans), and FHIR AuditEvent logging (every
  PHI access, AI sign-off, CDS override, conflict resolution, and PHI reveal writes
  an immutable audit record). None of these three is scoped to a single app or a
  single feature area — each applies to both Athena Provider and Athena Field.

  ADR-004 (PHI storage — encrypted at rest, never in URLs/localStorage) applies
  directly to US-SH-001. ADR-007, defined in the mock-backend architecture doc rather
  than the main plan (its AuditEventVerifier service exists specifically to verify
  that PHI access is being logged), applies only to US-SH-003 — it has no bearing on
  the HIPAA-storage or accessibility stories. US-SH-002 (accessibility) has no ADR of
  any kind backing it; WCAG 2.1 AA compliance is a design-system commitment (plan §5)
  rather than an architectural decision with alternatives considered.

  Depends on EPIC-AP-001 (auto-logoff and RBAC are session/identity concerns),
  EPIC-AP-002 (chart-view audit events and accessibility apply to the rendered chart
  surfaces), and EPIC-AF-001 (the offline core is where PHI-at-rest encryption and
  remote-wipe audit events originate) because these stories verify and constrain
  behavior that those epics' surfaces produce — there is nothing to make compliant or
  accessible until the underlying identity, chart, and offline surfaces exist.
