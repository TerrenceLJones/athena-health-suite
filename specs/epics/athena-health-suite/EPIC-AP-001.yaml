notes: |
  Groups the identity and access-control foundation that every other Athena Provider
  feature is built on top of: standard login and session lifecycle (auto-logoff, token
  refresh, password reset, silent single-session enforcement), SMART on FHIR launch
  context resolution (EHR launch and standalone), and role-based chart/action gating
  enforced both client- and server-side.

  No numbered ADR in the plan covers identity/session/RBAC specifically — ADR-001
  through ADR-005 address FHIR typing, offline sync, conflict resolution, PHI storage,
  and alert fatigue, none of which is the architectural decision this epic turns on.

  Every subsequent Provider epic (chart core, CDS/AI, prior auth) assumes an
  authenticated session with a resolved patient/encounter context and a known clinical
  role, so this epic has no upstream dependencies within Athena Health Suite and is the
  natural starting point for Provider implementation.
