notes: |
  Groups the two decision-support surfaces that sit on top of the chart core: CDS
  Hooks tiered alerting (Critical/Advisory/Informational, required-reason override
  capture, override-rate tracking) and the AI ambient-documentation assistant
  (streaming SOAP note draft, evidence-linked sentences, mandatory human-in-the-loop
  sign-off gate). Both are decision-support layers rendered inside the same chart
  shell EPIC-AP-002 establishes, and both write only to draft/scratchpad state until
  a clinician takes an explicit, audited action (override or sign), so they're kept
  together as one "assistive intelligence" epic rather than split across chart core.

  ADR-005 (Alert fatigue mitigation — tiered severity + override-rate measurement)
  covers only the CDS half of this epic. The AI documentation assistant's
  architecture (server-side-only Anthropic calls, evidence linking, ONC HTI-1
  model-facts panel, the three HITL gates) is documented in plan §12 AI Trust UX but
  has no numbered ADR of its own — it is not backed by a formal ADR the way the CDS
  tiering decision is.

  Depends on EPIC-AP-002 rather than directly on EPIC-AP-001, since both CDS cards
  and the AI documentation panel are rendered inside an already-loaded chart with a
  known encounter — they assume the chart core exists, not just an authenticated
  session.
