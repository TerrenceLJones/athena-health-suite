notes: |
  Isolates the prior-authorization workflow (draft → submitted → pending →
  additional-documentation-needed → approved/denied, with CMS-0057-F 72-hour urgent
  / 7-calendar-day standard turnaround deadlines) as its own epic rather than folding
  it into chart core, since it is a distinct async multi-step XState machine with its
  own regulatory deadline semantics and does not depend on the vitals/chart-rendering
  or CDS/AI surfaces at all — only on an authenticated, role-resolved session.

  Depends on EPIC-AP-001 for authentication and role context (a role must be able to
  initiate a PA) but not on EPIC-AP-002 or EPIC-AP-003, since the PA tracker is a
  standalone panel that does not require the vitals dashboard, chart rendering, CDS
  Hooks, or AI documentation to function. No numbered ADR in the plan addresses prior
  authorization specifically.
