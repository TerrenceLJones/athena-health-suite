notes: |
  Groups the field-clinician-facing capture surfaces that produce outbox entries —
  server-pushed FHIR Questionnaire forms with enableWhen conditional logic, wound
  photo capture with mandatory EXIF/GPS stripping and blur/glare quality checks, and
  the sync-status visibility layer (per-record badges, global SyncStatusBar, push
  notifications that always re-fetch rather than trust stale payloads) that lets a
  clinician see what state their captured data is actually in. These three are kept
  together because they are all downstream producers/consumers of the outbox and
  sync engine EPIC-AF-001 establishes, rather than being part of that engine itself.

  Depends on EPIC-AF-001 because every form submission and photo capture writes into
  the local WatermelonDB and outbox, and every sync-status indicator reads the state
  that engine produces — none of this epic's stories can exist without the offline
  core already in place. No numbered ADR in the plan addresses forms, photo capture,
  or sync-status UI specifically.
